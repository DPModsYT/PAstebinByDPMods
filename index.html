<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSON App Manager</title>
    <style>
        /* Base Themes */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-hover: rgba(255, 255, 255, 0.12);
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Default Blue Theme */
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e1b4b;
        }

        [data-theme="red"] {
            --accent: #ef4444;
            --accent-hover: #dc2626;
            --bg-grad-1: #2a0f12;
            --bg-grad-2: #4b1b22;
        }

        [data-theme="pink"] {
            --accent: #ec4899;
            --accent-hover: #db2777;
            --bg-grad-1: #2a0f21;
            --bg-grad-2: #4b1b38;
        }

        [data-theme="green"] {
            --accent: #10b981;
            --accent-hover: #059669;
            --bg-grad-1: #0f2a1b;
            --bg-grad-2: #1b4b32;
        }
        
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2)); 
            background-attachment: fixed;
            color: var(--text-main); 
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem 1rem;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.5s ease;
        }

        /* Particle Background */
        #particles-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Keeps particles behind the UI */
            pointer-events: none;
        }

        .container { max-width: 900px; margin: 0 auto; width: 100%; position: relative; z-index: 1; }

        /* Animations */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-view { animation: fadeSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Glassmorphism */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        /* Header & Theme Picker */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        header h1 { margin: 0; font-size: 1.5rem; color: var(--accent); font-weight: 600; text-shadow: 0 2px 10px rgba(var(--accent), 0.2); transition: color 0.3s; }
        
        .user-controls { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; }
        .user-badge { padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; }
        
        .theme-picker { display: flex; gap: 8px; align-items: center; background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 20px; border: 1px solid var(--glass-border); }
        .theme-dot { width: 16px; height: 16px; border-radius: 50%; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .theme-dot:hover { transform: scale(1.2); }
        .theme-dot.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 8px currentColor; }
        .theme-dot[data-color="blue"] { background: #38bdf8; color: #38bdf8; }
        .theme-dot[data-color="red"] { background: #ef4444; color: #ef4444; }
        .theme-dot[data-color="pink"] { background: #ec4899; color: #ec4899; }
        .theme-dot[data-color="green"] { background: #10b981; color: #10b981; }

        /* Login Screen */
        #loginSection { width: 100%; max-width: 400px; margin: 5vh auto; padding: 2rem 1.5rem; border-radius: 16px; text-align: center; box-sizing: border-box; }
        #loginSection input { width: 100%; margin-bottom: 1rem; padding: 1rem; border-radius: 8px; background: rgba(0,0,0,0.3) !important; border: 1px solid var(--glass-border) !important; color: white !important; outline: none; box-sizing: border-box; font-size: 1rem; -webkit-appearance: none; }
        #loginSection button { width: 100%; padding: 1rem; border-radius: 8px; background: var(--accent); color: #000; font-weight: bold; border: none; cursor: pointer; font-size: 1rem; transition: var(--transition-smooth); }

        /* Navigation Tabs */
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem; overflow-x: auto; white-space: nowrap; }
        .tab-btn { background: transparent; border: none; color: var(--text-muted); font-size: 1rem; cursor: pointer; padding: 0.8rem 1rem; border-radius: 8px; transition: var(--transition-smooth); flex-shrink: 0; }
        .tab-btn.active { color: var(--accent); background: var(--glass-bg); font-weight: 600; box-shadow: inset 0 -2px 0 var(--accent); }
        .add-btn { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 0.8rem 1rem; font-weight: 600; cursor: pointer; margin-left: auto; display: flex; align-items: center; gap: 5px; transition: var(--transition-smooth); }
        
        /* Search Bar */
        .search-bar { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 1rem; border-radius: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.8rem; transition: var(--transition-smooth); }
        .search-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(var(--accent), 0.2); }
        .search-bar input { background: transparent !important; border: none !important; color: white !important; outline: none; flex-grow: 1; font-size: 1rem; min-width: 150px; -webkit-appearance: none; }
        .search-bar input::placeholder { color: var(--text-muted); }
        .total-count { color: var(--text-muted); font-size: 0.85rem; white-space: nowrap; }

        /* Cards Grid */
        .grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        .card { padding: 1.25rem; border-radius: 12px; transition: var(--transition-smooth); word-wrap: break-word; border-left: 3px solid transparent; }
        .card:hover { border-left-color: var(--accent); background: rgba(255,255,255,0.08); transform: translateY(-2px); }
        .card-header { font-size: 1.15rem; font-weight: 600; margin-bottom: 1rem; letter-spacing: 0.5px; color: #fff; word-break: break-all; }
        .card-actions { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
        .action-btn { background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: var(--text-main); padding: 0.6rem 0.8rem; border-radius: 8px; font-size: 0.85rem; cursor: pointer; transition: var(--transition-smooth); display: flex; align-items: center; justify-content: center; gap: 5px; flex-grow: 1; min-height: 40px; }
        .action-btn:hover { background: var(--glass-hover); border-color: rgba(255,255,255,0.3); }
        .btn-public { background: var(--accent); color: #000; border: none; font-weight: 600; flex-grow: 2; }
        
        .card-meta { display: flex; justify-content: space-between; border-top: 1px solid var(--glass-border); padding-top: 1rem; font-size: 0.8rem; color: var(--text-muted); flex-wrap: wrap; gap: 0.8rem; }
        .meta-item { display: flex; align-items: center; gap: 6px; }

        /* Editor Section Redesign (Fixed for Android) */
        #viewEditor { padding: 2rem 1.5rem; border-radius: 16px; }
        .editor-form-group { display: flex; flex-direction: column; gap: 1.5rem; margin-top: 1.5rem; }
        .input-wrapper { display: flex; flex-direction: column; gap: 0.5rem; }
        .input-wrapper label { font-size: 0.9rem; color: var(--accent); font-weight: 500; padding-left: 4px; transition: color 0.3s; }
        
        /* Strict overrides to fix Android white background issue */
        #editorSection input, #editorSection textarea { 
            -webkit-appearance: none; /* Strips mobile OS styles */
            width: 100%; 
            padding: 1.2rem; 
            border-radius: 12px; 
            background-color: rgba(0,0,0,0.4) !important; 
            border: 1px solid var(--glass-border) !important; 
            color: #ffffff !important; 
            font-size: 1rem; 
            font-family: 'Courier New', monospace; 
            box-sizing: border-box; 
            outline: none; 
            transition: var(--transition-smooth);
            line-height: 1.5;
        }
        
        #editorSection input::placeholder, #editorSection textarea::placeholder { color: #94a3b8 !important; }
        
        #editorSection input:focus, #editorSection textarea:focus { 
            border-color: var(--accent) !important; 
            background-color: rgba(0,0,0,0.6) !important;
            box-shadow: 0 0 0 3px rgba(var(--accent), 0.15);
        }
        
        #editorSection textarea { min-height: 200px; resize: none; overflow: hidden; }

        .save-btn { background: var(--accent); color: #000; border: none; border-radius: 12px; padding: 1.2rem; font-size: 1.1rem; font-weight: bold; width: 100%; cursor: pointer; min-height: 54px; transition: var(--transition-smooth); margin-top: 1rem; }

        .hidden { display: none !important; }
        svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            body { padding: 1rem 0.5rem; }
            .tabs { padding-bottom: 0.5rem; scrollbar-width: none; }
            .tabs::-webkit-scrollbar { display: none; }
            .add-btn { position: fixed; bottom: 24px; right: 24px; border-radius: 50px; padding: 1.2rem; box-shadow: 0 8px 25px rgba(0,0,0, 0.4); z-index: 100; }
            .add-btn span { display: none; }
            .add-btn svg { width: 24px; height: 24px; margin: 0; }
            .action-btn { flex-basis: 30%; }
            .btn-public { flex-basis: 100%; margin-top: 0.5rem; }
            #viewEditor { padding: 1.5rem 1rem; }
        }
    </style>
</head>
<body data-theme="blue">

<canvas id="particles-bg"></canvas>

<div class="container">
    <div id="loginSection" class="glass">
        <h2 style="margin-top: 0;">Admin Access</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Secure Login</button>
    </div>

    <div id="appSection" class="hidden">
        <header>
            <h1>App Manager</h1>
            
            <div class="user-controls">
                <div class="theme-picker">
                    <span class="theme-dot active" data-color="blue"></span>
                    <span class="theme-dot" data-color="red"></span>
                    <span class="theme-dot" data-color="pink"></span>
                    <span class="theme-dot" data-color="green"></span>
                </div>

                <div class="glass user-badge" id="userEmailBadge">admin</div>
                <button id="logoutBtn" class="action-btn" style="border-color: var(--danger); color: var(--danger); flex-grow: 0; min-height: 36px; padding: 0.4rem 1rem;">Logout</button>
            </div>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" id="tabMyPastes">My Apps</button>
            <button class="tab-btn" id="tabCreate">Editor</button>
            <button class="add-btn" id="btnAddNew">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg> <span>New App</span>
            </button>
        </nav>

        <div id="viewList" class="animate-view">
            <div class="search-bar glass">
                <input type="text" id="searchInput" placeholder="Search apps...">
                <div class="total-count" id="totalCount">Total: 0 Apps</div>
            </div>
            <div class="grid" id="cardsGrid">
                </div>
        </div>

        <div id="viewEditor" class="glass hidden" id="editorSection">
            <h2 id="editorTitle" style="margin-top: 0; font-weight: 500;">Add New App</h2>
            
            <div class="editor-form-group" id="editorSection">
                <div class="input-wrapper">
                    <label for="appName">Endpoint ID</label>
                    <input type="text" id="appName" placeholder="e.g. com.xplayer.config">
                </div>
                
                <div class="input-wrapper">
                    <label for="jsonInput">JSON Payload</label>
                    <textarea id="jsonInput" placeholder='{
  "status": "active",
  "version": "1.0",
  "features": []
}'></textarea>
                </div>
                
                <button id="saveBtn" class="save-btn">Deploy to Database</button>
            </div>
        </div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
