<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure JSON Manager</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #0ea5e9;
        }
        
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: linear-gradient(135deg, #0f172a, #1e1b4b); 
            color: #f8fafc; 
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            box-sizing: border-box;
        }

        .glass-panel { 
            width: 100%;
            max-width: 900px; 
            background: var(--glass-bg); 
            padding: 2.5rem; 
            border-radius: 16px; 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 { margin-top: 0; font-weight: 500; letter-spacing: 0.5px; }

        input, textarea, button { 
            width: 100%; 
            margin-bottom: 1.25rem; 
            padding: 0.875rem; 
            border-radius: 8px; 
            border: 1px solid var(--glass-border); 
            background: rgba(0, 0, 0, 0.2); 
            color: #fff; 
            box-sizing: border-box; 
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus { border-color: var(--accent); }
        textarea { height: 250px; font-family: 'Courier New', Courier, monospace; resize: vertical; }

        button { 
            background: var(--accent); 
            cursor: pointer; 
            font-weight: 600; 
            border: none; 
            transition: transform 0.2s, opacity 0.2s; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:active { transform: translateY(1px); }

        .hidden { display: none !important; }

        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        #logoutBtn { width: auto; background: #ef4444; margin: 0; padding: 0.5rem 1rem; font-size: 0.875rem; }

        /* Dashboard Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
        }

        .endpoint-list {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 1rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .endpoint-item {
            background: var(--glass-bg);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 0.75rem;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .endpoint-item:hover { border-color: var(--accent); }
        .endpoint-title { font-weight: bold; font-size: 1.05rem; margin-bottom: 6px; word-break: break-all; color: #38bdf8;}
        .endpoint-meta { display: flex; justify-content: space-between; font-size: 0.8rem; color: #94a3b8; align-items: center;}
        .meta-group { display: flex; align-items: center; gap: 4px; }

        .link-box { 
            background: rgba(16, 185, 129, 0.1); 
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 1rem; 
            border-radius: 8px; 
            margin-top: 1rem; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        
        .link-text-area { overflow: hidden; }
        a { color: #38bdf8; text-decoration: none; font-weight: 500; word-break: break-all; }
        a:hover { text-decoration: underline; }

        #copyBtn { width: auto; margin: 0; background: #10b981; padding: 0.5rem 1rem; font-size: 0.875rem; }

        svg { width: 16px; height: 16px; fill: currentColor; }

        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .link-box { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <div id="loginSection">
        <h2>Authentication Required</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Secure Login</button>
    </div>

    <div id="dashboardSection" class="hidden">
        <div class="header-flex">
            <h2>JSON Workspace</h2>
            <button id="logoutBtn">Logout</button>
        </div>
        
        <div class="dashboard-grid">
            <div>
                <h3 style="font-size: 1.1rem; margin-top: 0;">Your Endpoints</h3>
                <div id="endpointsContainer" class="endpoint-list">
                    <p style="font-size: 0.9rem; color: #94a3b8;">Loading...</p>
                </div>
            </div>

            <div>
                <input type="text" id="endpointName" placeholder="Endpoint Name (e.g., app_config)">
                <textarea id="jsonInput" placeholder='{
  "key": "value"
}'></textarea>
                <button id="saveBtn">
                    <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                    Deploy to Database
                </button>

                <div id="linkContainer" class="link-box hidden">
                    <div class="link-text-area">
                        <strong>🚀 Live Raw JSON Link:</strong><br>
                        <a id="rawLink" href="#" target="_blank"></a>
                    </div>
                    <button id="copyBtn">
                        <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                        Copy
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
