<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Admin Panel</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-hover: rgba(255, 255, 255, 0.12);
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e1b4b;
        }
        
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2)); 
            background-attachment: fixed;
            color: var(--text-main); 
            min-height: 100vh;
            margin: 0;
            padding: 2rem 1rem;
            box-sizing: border-box;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Glassmorphism Utilities */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        header h1 { margin: 0; font-size: 1.8rem; color: var(--accent); font-weight: 600; text-shadow: 0 2px 10px rgba(56, 189, 248, 0.3); }
        .user-controls { display: flex; gap: 1rem; align-items: center; }
        .user-badge { padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.9rem; }

        /* Login Screen */
        #loginSection { max-width: 400px; margin: 10vh auto; padding: 2rem; border-radius: 16px; text-align: center; }
        #loginSection input { width: 100%; margin-bottom: 1rem; padding: 1rem; border-radius: 8px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: white; outline: none; }
        #loginSection button { width: 100%; padding: 1rem; border-radius: 8px; background: var(--accent); color: #000; font-weight: bold; border: none; cursor: pointer; }

        /* Navigation Tabs */
        .tabs { display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem; }
        .tab-btn { background: transparent; border: none; color: var(--text-muted); font-size: 1.1rem; cursor: pointer; padding: 0.5rem 1rem; border-radius: 8px; transition: 0.3s; }
        .tab-btn.active { color: var(--accent); background: var(--glass-bg); font-weight: 600; }
        .tab-btn:hover:not(.active) { color: var(--text-main); }

        .add-btn { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 0.5rem 1rem; font-weight: 600; cursor: pointer; margin-left: auto; display: flex; align-items: center; gap: 5px; }
        
        /* Search Bar */
        .search-bar { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-radius: 12px; margin-bottom: 2rem; }
        .search-bar input { background: transparent; border: none; color: white; outline: none; width: 60%; font-size: 1rem; }
        .search-bar input::placeholder { color: var(--text-muted); }
        .total-count { color: var(--text-muted); font-size: 0.9rem; }

        /* Cards Grid */
        .grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        .card { padding: 1.25rem; border-radius: 12px; transition: transform 0.2s; }
        .card:hover { border-color: rgba(255,255,255,0.3); transform: translateY(-2px); }
        
        .card-header { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; letter-spacing: 0.5px; }
        
        .card-actions { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
        .action-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-main); padding: 0.4rem 0.8rem; border-radius: 6px; font-size: 0.85rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        .action-btn:hover { background: var(--glass-hover); }
        .btn-visit:hover { border-color: var(--accent); color: var(--accent); }
        .btn-delete:hover { border-color: var(--danger); color: var(--danger); }
        .btn-public { background: var(--accent); color: #000; border: none; margin-left: auto; font-weight: 600; }

        .card-meta { display: flex; justify-content: space-between; border-top: 1px solid var(--glass-border); padding-top: 1rem; font-size: 0.85rem; color: var(--text-muted); }
        .meta-item { display: flex; align-items: center; gap: 6px; }

        /* Editor Section */
        #editorSection { padding: 2rem; border-radius: 16px; }
        #editorSection input, #editorSection textarea { width: 100%; margin-bottom: 1.5rem; padding: 1rem; border-radius: 8px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: white; font-size: 1rem; font-family: 'Courier New', monospace; box-sizing: border-box; }
        #editorSection input:focus, #editorSection textarea:focus { outline: none; border-color: var(--accent); }
        #editorSection textarea { height: 300px; resize: vertical; }
        .save-btn { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 1rem; font-size: 1.1rem; font-weight: bold; width: 100%; cursor: pointer; }

        .hidden { display: none !important; }
        svg { width: 16px; height: 16px; fill: currentColor; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection" class="glass">
        <h2 style="margin-top: 0;">Admin Access</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
    </div>

    <div id="appSection" class="hidden">
        <header>
            <h1>JSON Manager</h1>
            <div class="user-controls">
                <div class="glass user-badge" id="userEmailBadge">admin@admin.com</div>
                <button id="logoutBtn" class="action-btn" style="border-color: var(--danger); color: var(--danger);">Logout</button>
            </div>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" id="tabMyPastes">My Endpoints</button>
            <button class="tab-btn" id="tabCreate">Editor</button>
            <button class="add-btn" id="btnAddNew">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg> New JSON
            </button>
        </nav>

        <div id="viewList">
            <div class="search-bar glass">
                <input type="text" id="searchInput" placeholder="Search endpoints...">
                <div class="total-count" id="totalCount">Total: 0 endpoints</div>
            </div>
            <div class="grid" id="cardsGrid">
                </div>
        </div>

        <div id="viewEditor" class="glass hidden" style="padding: 2rem;">
            <h2 id="editorTitle" style="margin-top: 0; font-weight: 500;">Create New JSON</h2>
            <input type="text" id="endpointName" placeholder="Endpoint Name (e.g., app_config)">
            <textarea id="jsonInput" placeholder='{"key": "value"}'></textarea>
            <button id="saveBtn" class="save-btn">Deploy to Database</button>
        </div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
